<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Relatórios de Fiscalizações</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f172a; --panel:#ffffff; --panel-2:#f8fafc; --ink:#0f172a; --muted:#64748b;
  --line:#e2e8f0; --accent:#0ea5e9; --accent-d:#0369a1; --shadow:0 1px 3px rgba(15,23,42,.08),0 8px 24px rgba(15,23,42,.06);
  --casal:#008cff; --conasa:#e6b000; --brk:#0bedf5; --verde:#22c55e; --saae:#a855f7; --conama:#ec4899; --outros:#94a3b8;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--panel-2);color:var(--ink);font-size:14px}
header{background:linear-gradient(120deg,#0c4a6e,#0e7490);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header .logo{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.15);display:grid;place-items:center;font-size:22px}
header h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px}
header p{margin:2px 0 0;font-size:12.5px;opacity:.85}
header .src{margin-left:auto;text-align:right;font-size:11.5px;opacity:.9;line-height:1.5}
header .src b{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:600}
.live-on{background:#16a34a;color:#fff} .live-off{background:#475569;color:#fff}
.wrap{padding:18px 24px;max-width:1500px;margin:0 auto}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:end;background:var(--panel);padding:14px 16px;border-radius:14px;box-shadow:var(--shadow);margin-bottom:16px}
.f{display:flex;flex-direction:column;gap:4px}
.f label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.f select,.f input{padding:8px 10px;border:1px solid var(--line);border-radius:9px;font-size:13px;background:#fff;min-width:130px;color:var(--ink)}
.f input{min-width:180px}
.btn{padding:8px 14px;border:1px solid var(--line);background:#fff;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--accent-d)}
.btn:hover{background:var(--panel-2)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.kpi{background:var(--panel);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .v{font-size:30px;font-weight:800;line-height:1;color:var(--accent-d)}
.kpi .l{font-size:12px;color:var(--muted);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.kpi .bar{position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--accent)}
.grid{display:grid;grid-template-columns:1.25fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--panel);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
.card h3{margin:0;padding:13px 16px;font-size:14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;justify-content:space-between}
.card h3 .toggle{display:flex;gap:4px}
.card h3 .toggle button{font-size:11px;padding:4px 9px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:600;color:var(--muted)}
.card h3 .toggle button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
#map{height:460px;width:100%}
.chartbox{padding:14px 16px;height:430px}
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:10px 16px;border-top:1px solid var(--line);font-size:12px}
.legend span{display:inline-flex;align-items:center;gap:6px;color:var(--muted)}
.dot{width:11px;height:11px;border-radius:50%;display:inline-block}
.tablecard{background:var(--panel);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.tablecard .top{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line)}
.tablewrap{max-height:520px;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{position:sticky;top:0;background:var(--panel-2);text-align:left;padding:10px 14px;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:1px solid var(--line)}
thead th:hover{color:var(--accent-d)}
tbody td{padding:9px 14px;border-bottom:1px solid var(--line)}
tbody tr:hover{background:#f1f5f9}
.tag{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;color:#fff}
.pdf{color:var(--accent-d);font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.pdf:hover{text-decoration:underline}
.muted{color:var(--muted)}
.leaflet-popup-content{font-size:13px;line-height:1.5}
.leaflet-popup-content b{color:var(--accent-d)}
.empty{padding:40px;text-align:center;color:var(--muted)}
.notice{background:#fffbeb;border:1px solid #fde68a;color:#92400e;padding:10px 14px;border-radius:10px;font-size:12.5px;margin-bottom:16px;display:none}
@media(max-width:1050px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <div class="logo">💧</div>
  <div>
    <h1>Painel de Relatório de Fiscalizações</h1>
    <p>Gerência de Fiscalização Operacional de Saneamento (Gefsan)</p>
  </div>
  <div class="src">
    <div>Fonte: <span id="srcMode" class="src"></span></div>
    <div id="lastInfo" style="opacity:.95;color:#fff"></div>
  </div>
</header>

<div class="wrap">
  <div id="notice" class="notice"></div>

  <div class="filters" id="filters">
    <div class="f"><label>Ano</label><select id="fAno"></select></div>
    <div class="f"><label>Prestadora</label><select id="fPrest"></select></div>
    <div class="f"><label>Tipo</label><select id="fTipo"></select></div>
    <div class="f"><label>Escopo</label><select id="fEscopo"></select></div>
    <div class="f"><label>Município</label><select id="fMun"></select></div>
    <div class="f"><label>Buscar</label><input id="fBusca" type="text" placeholder="município, prestadora..."></div>
    <button class="btn" id="btnClear">Limpar filtros</button>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="grid">
    <div class="card">
      <h3>🗺️ Mapa de Fiscalizações <span class="muted" id="mapCount" style="font-weight:500;font-size:12px"></span></h3>
      <div id="map"></div>
      <div class="legend" id="legend"></div>
    </div>
    <div class="card">
      <h3>📈 Evolução
        <span class="toggle">
          <button data-mode="ano" class="active">Por ano</button>
          <button data-mode="mes">Por mês</button>
        </span>
      </h3>
      <div class="chartbox"><canvas id="chart"></canvas></div>
    </div>
  </div>

  <div class="tablecard">
    <div class="top">
      <h3 style="margin:0;border:0;padding:0;font-size:14px">📋 Relatórios <span class="muted" id="tblCount" style="font-weight:500;font-size:12px"></span></h3>
      <span class="muted" style="font-size:12px">Clique nos cabeçalhos para ordenar · clique em "PDF" para abrir</span>
    </div>
    <div class="tablewrap">
      <table id="tbl">
        <thead><tr id="thead"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

function norm(d){
  // aceita vírgula OU ponto decimal (o CSV publicado do Sheets usa vírgula no locale pt-BR)
  const num = v => parseFloat(String(v==null?'':v).trim().replace(',', '.'));
  const lat = num(d['Latitude']), lng = num(d['Longitude']);
  const mesNum = parseInt(d['Nº do Mês']) || MES_ORD[(d['Mês']||'').toUpperCase()] || 0;
  return {
    mun:d['Município']||'', tipo:d['Tipo']||'', escopo:d['Escopo']||'',
    prest:(d['Prestadora']||'').toUpperCase(), ano:parseInt(d['Ano'])||0,
    mes:(d['Mês']||'').toUpperCase(), mesNum, link:d['Link']||'',
    lat:isFinite(lat)?lat:null, lng:isFinite(lng)?lng:null
  };
}

function parseCSV(text){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false;} else cur+=c; }
    else { if(c==='"')q=true; else if(c===','){row.push(cur);cur='';}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
      else if(c==='\r'){} else cur+=c; } }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  const hdr=rows.shift().map(h=>h.trim());
  return rows.filter(r=>r.some(c=>c&&c.trim())).map(r=>{const o={};hdr.forEach((h,i)=>o[h]=(r[i]||'').trim());return o;});
}

async function loadData(){
  const modeEl=document.getElementById('srcMode'), info=document.getElementById('lastInfo');
  let liveFail=false;
  if(LIVE_CSV_URL){
    try{
      const res=await fetch(LIVE_CSV_URL,{cache:'no-store'}); const txt=await res.text();
      const recs=parseCSV(txt).map(norm).filter(r=>r.mun);
      if(recs.length){ RAW=recs; modeEl.innerHTML='<b class="live-on">AO VIVO</b> Google Sheet';
        const agora=new Date().toLocaleString('pt-BR');
        info.textContent='Atualizado '+agora+' · '+recs.length+' registros'; return; }
      liveFail=true;
    }catch(e){ console.warn('Falha no modo ao vivo, usando snapshot:',e); liveFail=true; }
  }
  RAW=EMBEDDED_DATA.map(norm).filter(r=>r.mun);
  modeEl.innerHTML='<b class="live-off">SNAPSHOT</b> dados embutidos';
  info.textContent=RAW.length+' registros';
  const n=document.getElementById('notice'); n.style.display='block';
  if(liveFail){
    n.innerHTML='⚠️ <b>Não foi possível ler ao vivo</b> (sem internet ou planilha indisponível). Exibindo o último snapshot embutido.';
  }else{
    n.innerHTML='ℹ️ <b>Modo snapshot.</b> Para dados em tempo real, publique a planilha na web (CSV) e cole a URL na constante <code>LIVE_CSV_URL</code> no topo do arquivo.';
  }
}

/* ---------- filtros ---------- */
function uniq(key){return [...new Set(RAW.map(r=>r[key]).filter(Boolean))];}
function fillSelect(id,vals,label){
  const s=document.getElementById(id);
  s.innerHTML='<option value="">'+label+'</option>'+
    vals.map(v=>`<option value="${v}">${v}</option>`).join('');
}
function buildFilters(){
  fillSelect('fAno',uniq('ano').sort((a,b)=>b-a),'Todos');
  fillSelect('fPrest',uniq('prest').sort(),'Todas');
  fillSelect('fTipo',uniq('tipo').sort(),'Todos');
  fillSelect('fEscopo',uniq('escopo').sort(),'Todos');
  fillSelect('fMun',uniq('mun').sort(),'Todos');
}
function getFilters(){
  return {ano:fAno.value,prest:fPrest.value,tipo:fTipo.value,escopo:fEscopo.value,
    mun:fMun.value,busca:fBusca.value.trim().toLowerCase()};
}
function applyFilters(){
  const f=getFilters();
  return RAW.filter(r=>{
    if(f.ano && r.ano!=f.ano) return false;
    if(f.prest && r.prest!=f.prest) return false;
    if(f.tipo && r.tipo!=f.tipo) return false;
    if(f.escopo && r.escopo!=f.escopo) return false;
    if(f.mun && r.mun!=f.mun) return false;
    if(f.busca){const hay=(r.mun+' '+r.prest+' '+r.tipo+' '+r.escopo+' '+r.mes+' '+r.ano).toLowerCase();
      if(!hay.includes(f.busca)) return false;}
    return true;
  });
}

/* ---------- KPIs ---------- */
function renderKPIs(data){
  const anos=data.map(r=>r.ano).filter(Boolean);
  const periodo=anos.length?Math.min(...anos)+'-'+Math.max(...anos):'—';
  const kpis=[
    {v:data.length,l:'Relatórios',c:'var(--accent)'},
    {v:new Set(data.map(r=>r.mun)).size,l:'Municípios',c:'#16a34a'},
    {v:new Set(data.map(r=>r.prest)).size,l:'Prestadoras',c:'#f59e0b'},
    {v:periodo,l:'Período',c:'#a855f7'},
  ];
  document.getElementById('kpis').innerHTML=kpis.map(k=>
    `<div class="kpi"><div class="bar" style="background:${k.c}"></div><div class="v" style="color:${k.c}">${k.v}</div><div class="l">${k.l}</div></div>`).join('');
}

/* ---------- Mapa ---------- */
function initMap(){
  map=L.map('map',{scrollWheelZoom:true,preferCanvas:true}).setView([-9.55,-36.5],7.4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    {attribution:'© OpenStreetMap, © CARTO',maxZoom:19,
     subdomains:'abcd',crossOrigin:true}).addTo(map);
  markersLayer=L.layerGroup().addTo(map);
  // --- robustez de layout: corrige tiles "bugados" quando hospedado ---
  const fix=()=>map&&map.invalidateSize();
  if(window.ResizeObserver){ new ResizeObserver(fix).observe(document.getElementById('map')); }
  window.addEventListener('load',()=>setTimeout(fix,150));
  window.addEventListener('resize',fix);
  map.whenReady(()=>requestAnimationFrame(()=>requestAnimationFrame(fix)));
}
function renderMap(data){
  markersLayer.clearLayers();
  let n=0;
  data.forEach(r=>{
    if(r.lat==null||r.lng==null) return; n++;
    const m=L.circleMarker([r.lat,r.lng],{radius:6,fillColor:colorFor(r.prest),
      color:'#fff',weight:1.5,fillOpacity:.9});
    const pdf=r.link?`<br><a href="${r.link}" target="_blank">📄 Abrir PDF</a>`:'';
    m.bindPopup(`<b>${r.mun}</b><br>${r.tipo} · ${r.escopo}<br>
      <span style="color:${colorFor(r.prest)};font-weight:700">${r.prest}</span> · ${r.mes}/${r.ano}${pdf}`);
    markersLayer.addLayer(m);
  });
  document.getElementById('mapCount').textContent='('+n+' pontos)';
  // legenda
  const prest=[...new Set(data.map(r=>r.prest))].sort();
  document.getElementById('legend').innerHTML=prest.map(p=>
    `<span><i class="dot" style="background:${colorFor(p)}"></i>${p}</span>`).join('');
}

/* ---------- Gráfico ---------- */
function renderChart(data){
  const prest=[...new Set(data.map(r=>r.prest))].sort();
  let labels, groups;
  if(state.chartMode==='ano'){
    labels=[...new Set(data.map(r=>r.ano))].filter(Boolean).sort((a,b)=>a-b);
    groups=r=>r.ano;
  }else{
    labels=[...Array(12).keys()].map(i=>i+1);
    groups=r=>r.mesNum;
  }
  const datasets=prest.map(p=>({
    label:p,backgroundColor:colorFor(p),borderRadius:4,stack:'s',
    data:labels.map(L=>data.filter(r=>r.prest===p&&groups(r)==L).length)
  }));
  const labText=state.chartMode==='ano'?labels.map(String):labels.map(i=>MES_LBL[i]);
  if(chart)chart.destroy();
  chart=new Chart(document.getElementById('chart'),{
    type:'bar',
    data:{labels:labText,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}},
        tooltip:{mode:'index'}},
      scales:{x:{stacked:true,grid:{display:false}},
        y:{stacked:true,beginAtZero:true,ticks:{precision:0},grid:{color:'#eef2f7'}}}}
  });
}

/* ---------- Tabela ---------- */
const COLS=[
  {k:'mun',t:'Município'},{k:'tipo',t:'Tipo'},{k:'escopo',t:'Escopo'},
  {k:'prest',t:'Prestadora'},{k:'ano',t:'Ano'},{k:'mes',t:'Mês'},{k:'link',t:'PDF'}
];
function renderTable(data){
  const th=document.getElementById('thead');
  th.innerHTML=COLS.map(c=>{
    const ar=state.sort.key===c.k?(state.sort.dir>0?' ▲':' ▼'):'';
    return `<th data-k="${c.k}">${c.t}${ar}</th>`;
  }).join('');
  const sorted=[...data].sort((a,b)=>{
    const k=state.sort.key,d=state.sort.dir;
    let A=a[k],B=b[k];
    if(k==='ano'){A=a.ano*100+a.mesNum;B=b.ano*100+b.mesNum;}
    if(typeof A==='string')A=A.toLowerCase(),B=B.toLowerCase();
    return A<B?-d:A>B?d:0;
  });
  const tb=document.getElementById('tbody');
  if(!sorted.length){tb.innerHTML='<tr><td colspan="7" class="empty">Nenhum relatório com esses filtros.</td></tr>';}
  else tb.innerHTML=sorted.map(r=>`<tr>
    <td><b>${r.mun}</b></td><td>${r.tipo}</td><td>${r.escopo}</td>
    <td><span class="tag" style="background:${colorFor(r.prest)}">${r.prest}</span></td>
    <td>${r.ano}</td><td>${r.mes}</td>
    <td>${r.link?`<a class="pdf" href="${r.link}" target="_blank">📄 PDF</a>`:'<span class="muted">—</span>'}</td>
  </tr>`).join('');
  document.getElementById('tblCount').textContent='('+sorted.length+')';
}

/* ---------- orquestra ---------- */
function refresh(){
  const data=applyFilters();
  renderKPIs(data); renderMap(data); renderChart(data); renderTable(data);
}

function wire(){
  ['fAno','fPrest','fTipo','fEscopo','fMun'].forEach(id=>document.getElementById(id).addEventListener('change',refresh));
  document.getElementById('fBusca').addEventListener('input',refresh);
  document.getElementById('btnClear').addEventListener('click',()=>{
    ['fAno','fPrest','fTipo','fEscopo','fMun'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('fBusca').value=''; refresh();
  });
  document.querySelectorAll('.card h3 .toggle button').forEach(b=>b.addEventListener('click',e=>{
    document.querySelectorAll('.card h3 .toggle button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); state.chartMode=b.dataset.mode; refresh();
  }));
  document.getElementById('thead').addEventListener('click',e=>{
    const k=e.target.closest('th')?.dataset.k; if(!k)return;
    if(state.sort.key===k)state.sort.dir*=-1; else state.sort={key:k,dir:1};
    renderTable(applyFilters());
  });
}

(async function(){
  await loadData();
  buildFilters(); initMap(); wire(); refresh();
  setTimeout(()=>map.invalidateSize(),200);
})();
</script>
